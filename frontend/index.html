<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Voice Beatmaker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <h1>VOICE BEATMAKER</h1>
        
        <div class="hints">

        </div>

        <div class="grid-wrapper">
            <div id="sequencer-grid" class="grid"></div>
        </div>

        <button id="resetBtn" tabindex="0">Очистить всё</button>
    </div>

    <script src="script.js"></script>
    <script src="https://assistant.sber.ru/sber-canvas-lp.js" async onload="initAssistant()"></script>
